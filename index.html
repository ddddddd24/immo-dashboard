dio", "is_fraud": false, "fraud_reason": ""}, {"id": "pap_463202364", "source": "pap", "title": "Appartement 55m\u00b2 \u2014 Paris 10E", "price": 580, "surface": 55, "location": "Paris 10E", "url": "https://www.pap.fr/annonces/appartement-paris-10e-r463202364", "score": 8.3, "score_reason": "PV=10.0 Z=6.0(Paris 10E) C=10.0(20min) F=5.0 \u2014 Grand 55m\u00b2 dans le 10e arrondissement, prix tr\u00e8s bas pour la surface, quartier m", "published": "2026-05-02", "published_is_scrape": true, "seen": "2026-05-02T14:54:59.555Z", "phone": null, "available_from": "", "housing_type": "studio", "housing_display": "studio", "is_fraud": false, "fraud_reason": ""}];
  const SOURCE_EMOJI = {"leboncoin": "\ud83d\udfe0", "seloger": "\ud83d\udd35", "pap": "\ud83d\udfe2", "bienici": "\ud83d\udfe3", "logicimmo": "\ud83d\udfe1", "studapart": "\ud83c\udf93", "parisattitude": "\ud83d\uddfc", "lodgis": "\ud83c\udfdb", "immojeune": "\ud83e\uddd1\u200d\ud83c\udf93", "locservice": "\ud83c\udfe0", "roomlala": "\ud83d\udecf", "entreparticuliers": "\ud83e\udd1d", "ladresse": "\ud83c\udfe2", "century21": "21", "wizi": "\ud83d\udd11", "laforet": "\ud83c\udf33", "guyhoquet": "\ud83c\udfa9", "inli": "\ud83c\udfd7", "gensdeconfiance": "\ud83e\udd1d", "cdc_habitat": "\ud83c\udfdb\ufe0f", "fnaim": "\ud83c\udfd8"};
  const OFF_RADAR_SOURCES = new Set(['studapart','parisattitude','lodgis','immojeune','locservice','entreparticuliers','ladresse','century21','wizi','laforet','guyhoquet','kley','inli','icf','actionlogement','gensdeconfiance','cdc_habitat','fnaim']);

  let sortKey = "published";
  let sortDir = -1;

  function render() {
    const src = document.getElementById('f-source').value;
    const type = document.getElementById('f-type').value;
    const maxPrice = parseInt(document.getElementById('f-maxprice').value) || null;
    const minSurface = parseInt(document.getElementById('f-minsurface').value) || null;
    const search = (document.getElementById('f-search').value || '').toLowerCase();
    const phoneOnly = document.getElementById('f-phone-only').checked;
    const days = parseInt(document.getElementById('f-days').value) || null;
    const daysCutoff = days ? Date.now() - days * 86400000 : null;

    let rows = ROWS.filter(r => {
      if (src && r.source !== src) return false;
      if (type && r.housing_type !== type) return false;
      if (maxPrice && (r.price === null || r.price > maxPrice)) return false;
      if (minSurface && (r.surface === null || r.surface < minSurface)) return false;
      if (phoneOnly) {
        if (!r.phone || r.phone === '#blocked') return false;
      }
      if (daysCutoff !== null) {
        // Récence = date où le bot a vu l'annonce (seen_at, re-stampé à chaque
        // scrape) — pas la date de publication (qui peut être absente/placeholder).
        const sm = r.seen ? new Date(r.seen).getTime() : 0;
        if (!sm || sm < daysCutoff) return false;
      }
      if (search) {
        const blob = (r.title + ' ' + r.location).toLowerCase();
        if (!blob.includes(search)) return false;
      }
      return true;
    });

    rows.sort((a, b) => {
      const va = a[sortKey], vb = b[sortKey];
      if (va === null && vb === null) return 0;
      if (va === null) return 1;
      if (vb === null) return -1;
      if (typeof va === 'number') return (va - vb) * sortDir;
      return String(va).localeCompare(String(vb)) * sortDir;
    });

    document.getElementById('count').textContent = rows.length + ' annonces';

    const escape = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    // YYYY-MM-DD → DD/MM/YYYY ; YYYY-MM → MM/YYYY
    const formatAvail = s => {
      if (!s) return '';
      const m1 = /^(\d{4})-(\d{2})-(\d{2})$/.exec(s);
      if (m1) return `${m1[3]}/${m1[2]}/${m1[1]}`;
      const m2 = /^(\d{4})-(\d{2})$/.exec(s);
      if (m2) return `${m2[2]}/${m2[1]}`;
      return s;
    };

    // Best-time-to-call: 🟢🟡🔴 based on source type + current local time
    const bestTimeToCall = (source) => {
      const PARTICULIERS = new Set(['leboncoin','pap','locservice','entreparticuliers','gensdeconfiance','bienici']);
      const AGENCES = new Set(['fnaim','foncia','century21','laforet','guyhoquet','ladresse','seloger','logicimmo','wizi']);
      const RESIDENCES = new Set(['studapart','immojeune','kley','inli','cdc_habitat','lodgis','parisattitude']);
      const now = new Date();
      const h = now.getHours();
      const isWeekend = (now.getDay() === 0 || now.getDay() === 6);
      let level = 'red', label = 'Pas le bon moment';
      if (PARTICULIERS.has(source)) {
        if (isWeekend) {
          if (h >= 10 && h < 12) { level = 'green'; label = 'Bon moment (WE matin)'; }
          else if (h >= 9 && h < 18) { level = 'yellow'; label = 'Acceptable'; }
          else { level = 'red'; label = 'Trop tôt/tard'; }
        } else {
          if (h >= 19 && h < 21) { level = 'green'; label = 'Bon moment (sem soir)'; }
          else if (h >= 12 && h < 22) { level = 'yellow'; label = 'Acceptable'; }
          else { level = 'red'; label = 'Trop tôt/tard'; }
        }
      } else if (AGENCES.has(source)) {
        if ((h >= 10 && h < 12) || (h >= 14 && h < 17)) { level = 'green'; label = 'Bon moment (heures bureau)'; }
        else if (h >= 9 && h < 18 && !isWeekend) { level = 'yellow'; label = 'Acceptable'; }
        else { level = 'red'; label = isWeekend ? 'WE = agences fermées' : 'Hors horaires bureau'; }
      } else if (RESIDENCES.has(source)) {
        if (!isWeekend && ((h >= 9 && h < 12) || (h >= 14 && h < 18))) { level = 'green'; label = 'Bon moment'; }
        else if (!isWeekend && h >= 8 && h < 19) { level = 'yellow'; label = 'Acceptable'; }
        else { level = 'red'; label = 'Hors horaires'; }
      }
      const emoji = level === 'green' ? '🟢' : level === 'yellow' ? '🟡' : '🔴';
      return {level, label, emoji};
    };
    // Score tooltip parser: "PV=X Z=Y(zone) C=Z(min) F=W — note" → labeled multiline
    const buildScoreTooltip = (reason, finalScore) => {
      if (!reason) return '';
      const m = /PV=([\d.]+)\s+Z=([\d.]+)(?:\(([^)]+)\))?\s+C=([\d.]+)(?:\(([^)]+)\))?\s+F=([\d.]+)(?:\s+—\s+(.+))?/.exec(reason);
      if (!m) return reason;
      const [_, pv, zs, zone, cs, commute, fs, note] = m;
      const lines = [
        `📊 Détail score ${finalScore}/10:`, '',
        `💰 Prix/Valeur (35%): ${pv}/10`,
        `📍 Zone (30%): ${zs}/10` + (zone ? ` — ${zone}` : ''),
        `🚇 Trajet (25%): ${cs}/10` + (commute ? ` — ${commute}` : ''),
        `✨ Features (10%): ${fs}/10`,
      ];
      if (note) lines.push('', `📝 ${note}`);
      return lines.join(String.fromCharCode(10));
    };

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = rows.map(r => {
      const emoji = SOURCE_EMOJI[r.source] || '⚪';
      const score = r.score
        ? `<span class="score" title="${escape(buildScoreTooltip(r.score_reason, r.score))}">${r.score}/10</span>`
        : '<span style="color:#475569">—</span>';
      const surface = r.surface ? r.surface + 'm²' : '<span style="color:#475569">—</span>';
      const price = r.price ? r.price + '€' : '<span style="color:#475569">—</span>';
      const typeBadge = r.housing_display
        ? `<span style="font-size:0.75rem;color:#cbd5e1;background:#334155;padding:2px 6px;border-radius:6px">${escape(r.housing_display)}</span>`
        : '<span style="color:#475569">—</span>';
      // 🔥 NEW: published_at < 6h ago
      const pubMs = r.published ? new Date(r.published.length > 7 ? r.published : r.published + '-01').getTime() : 0;
      const isNew = pubMs > Date.now() - 6 * 3600 * 1000;
      const newBadge = isNew ? '<span style="background:#ef4444;color:white;padding:1px 5px;border-radius:4px;font-size:0.7rem;font-weight:600;margin-right:4px">🔥 NEW</span>' : '';
      // 💎 OFF-RADAR: source not covered by Jinka
      const offRadarBadge = OFF_RADAR_SOURCES.has(r.source) ? '<span style="background:#8b5cf6;color:white;padding:1px 5px;border-radius:4px;font-size:0.7rem;font-weight:600;margin-right:4px" title="Source hors Jinka — moins de concurrence">💎</span>' : '';
      // ⚠️ SCAM SUSPECT — animated red, top priority
      const scamBadge = r.is_fraud ? `<span style="background:#dc2626;color:white;padding:2px 6px;border-radius:4px;font-size:0.7rem;font-weight:700;margin-right:4px;animation:pulse 1.5s infinite" title="${escape(r.fraud_reason || 'Annonce suspecte')}">⚠️ SCAM</span>` : '';
      // tel: clickable phone + best-time-to-call indicator
      let phoneCell;
      if (r.phone === '#blocked') { phoneCell = '🚫'; }
      else if (r.phone === '' || r.phone === null) { phoneCell = '⚪'; }
      else {
        const t = bestTimeToCall(r.source);
        const cleanTel = escape(r.phone.replace(/[^+\d]/g, ''));
        phoneCell = `<span title="${escape(t.label)}">${t.emoji}</span> <a href="tel:${cleanTel}" style="color:#22c55e;text-decoration:none;font-weight:600">📞 ${escape(r.phone)}</a>`;
      }
      return `<tr>
        <td><span class="src">${emoji} ${escape(r.source)}</span></td>
        <td>${scamBadge}${newBadge}${offRadarBadge}<a href="${escape(r.url)}" target="_blank">${escape(r.title.slice(0, 60))}</a></td>
        <td>${typeBadge}</td>
        <td>${escape(r.location.slice(0, 30))}</td>
        <td class="num"><b>${price}</b></td>
        <td class="num">${surface}</td>
        <td class="num">${score}</td>
        <td style="color:#64748b;font-size:0.75rem" title="${r.published_is_scrape ? 'Date de scraping (estimation)' : 'Date de publication réelle'}">${r.published ? (r.published_is_scrape ? '⏱ ' : '📅 ') + escape(r.published) : ''}</td>
        <td style="font-size:0.75rem" title="${r.available_from ? 'Disponible à partir de ' + escape(formatAvail(r.available_from)) : 'Date de disponibilité non précisée'}">${r.available_from ? '🗝 ' + escape(formatAvail(r.available_from)) : '<span style="color:#475569">—</span>'}</td>
        <td title="${r.phone === '#blocked' ? 'Site ne partage pas le téléphone' : (r.phone === '' || r.phone === null ? 'Pas de téléphone' : 'Tap pour appeler')}">${phoneCell}</td>
      </tr>`;
    }).join('') || '<tr><td colspan="10" class="empty">Aucune annonce ne matche les filtres.</td></tr>';

    document.querySelectorAll('th').forEach(th => {
      th.classList.remove('asc', 'desc');
      if (th.dataset.sort === sortKey) th.classList.add(sortDir === 1 ? 'asc' : 'desc');
    });
  }

  document.querySelectorAll('th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (sortKey === key) sortDir = -sortDir;
      else { sortKey = key; sortDir = (key === 'price' ? 1 : -1); }
      render();
    });
  });
  ['f-source', 'f-type', 'f-maxprice', 'f-minsurface', 'f-search'].forEach(id => {
    document.getElementById(id).addEventListener('input', render);
  });
  document.getElementById('f-phone-only').addEventListener('change', render);
  document.getElementById('f-days').addEventListener('change', render);

  render();
</script>
